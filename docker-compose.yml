version: "3.9"

# Services locaux pour le développement OpsAI
# Lance avec: docker compose up -d

services:
  # Redis — file de jobs BullMQ
  redis:
    image: redis:7-alpine
    container_name: opsai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis UI optionnel — http://localhost:8001
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: opsai_redis_ui
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8001:8081"
    depends_on:
      - redis

volumes:
  redis_data:

# Note: PostgreSQL est géré par Supabase CLI (`supabase start`)
# Supabase lance sa propre instance Postgres sur le port 54322
